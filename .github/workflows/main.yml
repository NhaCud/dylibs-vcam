name: Build_Dylib
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Setup Theos
        uses: sst1337/theos-action@main
      - name: Build
        run: |
          make package FINALPACKAGE=1
      - name: Upload
        uses: actions/upload-artifact@v3
        with:
          name: FakeCamera_Files
          path: packages/*.deb
