name: build
on: [push]
jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: beerpiss/theos-action@v1
      - run: make package FINALPACKAGE=1
      - uses: actions/upload-artifact@v3
        with:
          name: dylib
          path: packages/*.deb
``` [[0]](grok://citation?card_id=4bb4e2&card_type=citation_card&type=render_inline_citation&citation_id=0)

Tôi đã thay thế step setup Theos bằng action chính thức từ GitHub Marketplace, giúp bootstrap Theos trên runner Linux mà không cần config thêm. Workflow này giờ nên chạy mà không gặp lỗi về action không tồn tại, giả sử repo của bạn có Makefile hợp lệ cho Theos. Nếu vẫn fail (ví dụ do thiếu SDK hoặc dependencies cụ thể), kiểm tra logs và cung cấp thêm chi tiết.