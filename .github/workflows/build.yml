name: build
on: [push]
jobs:
  main:
    runs-on: macos-latest
    env:
      THEOS: theos
    steps:
      - uses: actions/checkout@v3
      - name: Install Dependencies
        run: brew install ldid xz
      - name: Setup Theos
        uses: actions/checkout@v3
        with:
          repository: theos/theos
          path: theos
      - name: Download SDKs
        run: |
          curl -LO https://github.com/theos/sdks/archive/master.zip
          unzip master.zip
          mv sdks-master/*.sdk $THEOS/sdks
          rm -r master.zip sdks-master
      - name: Build package
        run: make package FINALPACKAGE=1
      - uses: actions/upload-artifact@v3
        with:
          name: dylib
          path: packages/*.deb