name: build
on: [push]
jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: theos/setup-theos-action@v1
      - run: make package FINALPACKAGE=1
      - uses: actions/upload-artifact@v3
        with:
          name: dylib-file
          path: packages/*.deb
